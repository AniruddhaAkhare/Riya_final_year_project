services:
  - type: web
    name: my-flask-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:10000
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: USE_OCR
        value: "false"
      - key: DB_PATH
        value: "/tmp/database.db"